# Enphase IQ PowerPack 1500 -> Home Assistant, via a standard ESP32 (WROOM) + ESPHome.
# Uses a custom external component (components/powerpack_ble) that subscribes DIRECTLY to the
# telemetry notify characteristic instead of full GATT discovery — the device's huge GATT DB
# and short connection tolerance defeat the stock ble_client sensors.
#
# Per-unit values are in `substitutions:` (edit powerpack_ble_mac; json_service_uuid if needed).
# Secrets: wifi_ssid, wifi_password, fallback_ap_password, ota_password,
#          enphase_powerpack__encryption-key

substitutions:
  friendly_name: "Enphase PowerPack 1500"
  powerpack_ble_mac: "EC:C9:FF:95:76:52"
  json_service_uuid: "6d1b33f8-0000-11eb-a8b3-0242ac130003"   # confirm from first-boot log
  json_char_uuid:    "6d1b33f8-0010-11eb-a8b3-0242ac130003"

esphome:
  name: enphase-powerpack
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      sram1_as_iram: true
      minimum_chip_revision: "3.0"

external_components:
  # Pulled from GitHub so only THIS yaml needs to live on the ESPHome server.
  - source:
      type: git
      url: https://github.com/poindexter12/ohmward-lab
      ref: main
      path: projects/enphase-powerpack/firmware/esphome/components
    components: [powerpack_ble]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} AP"
    password: !secret fallback_ap_password

captive_portal:

logger:
  level: DEBUG         # temporary: watch BLE notifications

api:
  encryption:
    key: !secret enphase_powerpack__encryption-key

ota:
  - platform: esphome
    password: !secret ota_password

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false

ble_client:
  - mac_address: ${powerpack_ble_mac}
    id: pp_client

# Custom component: connect unbonded, subscribe directly to the telemetry char, parse JSON.
powerpack_ble:
  ble_client_id: pp_client
  service_uuid: ${json_service_uuid}
  characteristic_uuid: ${json_char_uuid}
  battery: {name: "Battery"}
  state_of_health: {name: "State of Health"}
  battery_power: {name: "Battery Power"}
  storage_power: {name: "Storage Power"}
  ac_load: {name: "AC Load"}
  grid_input: {name: "Grid Input"}
  solar_input: {name: "Solar Input"}
  inverter_output: {name: "Inverter Output"}
  battery_voltage: {name: "Battery Voltage"}
  battery_current: {name: "Battery Current"}
  battery_temp: {name: "Battery Temp"}
  battery_temp_max: {name: "Battery Temp Max"}
  ac_output_voltage: {name: "AC Output Voltage"}
  ac_output_current: {name: "AC Output Current"}
  ac_output_frequency: {name: "AC Output Frequency"}
  backup_time: {name: "Backup Time"}
  time_to_full: {name: "Time To Full"}
  battery_cycles: {name: "Battery Cycles"}
  cellular_signal: {name: "Cellular Signal"}
  battery_temp_min: {name: "Battery Temp Min"}
  cell_voltage_avg: {name: "Cell Voltage Avg"}
  cell_voltage_min: {name: "Cell Voltage Min"}
  cell_voltage_max: {name: "Cell Voltage Max"}
  usb_load: {name: "USB Load"}
  aux_load: {name: "Aux Load"}
  usb_voltage: {name: "USB Voltage"}
  usb_current: {name: "USB Current"}
  external_ac_input: {name: "External AC Input"}
  dc_12v_input: {name: "DC 12V Input"}
  grid_voltage: {name: "Grid Voltage"}
  grid_current: {name: "Grid Current"}
  grid_frequency: {name: "Grid Frequency"}
  solar_voltage: {name: "Solar Voltage"}
  solar_current: {name: "Solar Current"}
  fan1_duty: {name: "Fan 1 Duty"}
  fan2_duty: {name: "Fan 2 Duty"}
  fan3_duty: {name: "Fan 3 Duty"}

sensor:
  - platform: wifi_signal
    name: "PowerPack WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "PowerPack Uptime"

text_sensor:
  - platform: version
    name: "PowerPack ESPHome Version"

binary_sensor:
  - platform: status
    name: "PowerPack Status"
