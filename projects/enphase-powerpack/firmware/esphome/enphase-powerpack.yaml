# Enphase IQ PowerPack 1500 -> Home Assistant, via a standard ESP32 (WROOM) + ESPHome.
# Follows ohmward-lab conventions: esp32dev/arduino, AP fallback, captive_portal, plus debug
# sensors. Drop into your ESPHome server as a project device file.
#
# Per-unit values live in the `substitutions:` block below — edit powerpack_ble_mac and, if
# needed, json_service_uuid. Not secret (a BLE MAC is only useful within Bluetooth range).
#
# Secrets used (define in your ESPHome server secrets.yaml):
#   wifi_ssid, wifi_password, fallback_ap_password, ota_password,
#   enphase_powerpack__encryption-key
#
# TWO things to confirm on first boot (set logger to DEBUG, watch `esphome logs`):
#   1. powerpack_ble_mac matches the address advertised by PES_<serial>.
#   2. json_service_uuid — the service holding the 6d1b33f8-0010 telemetry characteristic
#      (best guess ...-0000-...). The GATT tree prints on connect.
#
# BLE note: a classic ESP32-WROOM is BT 4.2. ESPHome usually connects fine; if this unit
# refuses the link, switch `framework: type: esp-idf` (often more reliable for BLE) or use a
# BLE-5 board (C3/C6/S3) — the rest is identical.

substitutions:
  friendly_name: "Enphase PowerPack 1500"
  # ---- per-unit deploy values (edit these) ----
  powerpack_ble_mac: "EC:C9:FF:95:76:52"                      # from a BLE scan of PES_<serial>
  json_service_uuid: "6d1b33f8-0000-11eb-a8b3-0242ac130003"   # TODO confirm from first-boot log
  json_char_uuid:    "6d1b33f8-0010-11eb-a8b3-0242ac130003"   # telemetry JSON notify (constant)

esphome:
  name: enphase-powerpack
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      sram1_as_iram: true              # +40 KB IRAM (safe on chip rev 3.0+)
      minimum_chip_revision: "3.0"     # shrinks binary; log confirmed rev >= 3.0.
                                       # Remove if you ever flash an older ESP32.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} AP"
    password: !secret fallback_ap_password

captive_portal:

logger:
  level: INFO          # set DEBUG on first boot to see the GATT tree + MAC

api:
  encryption:
    key: !secret enphase_powerpack__encryption-key

ota:
  - platform: esphome
    password: !secret ota_password

# ---- BLE (connect unbonded; telemetry is plaintext) ----
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false   # back off scanning so the ble_client connection keeps radio time

ble_client:
  - mac_address: ${powerpack_ble_mac}
    id: pp_client
    on_connect:
      then:
        - logger.log: "PowerPack BLE connected"
    on_disconnect:
      then:
        - lambda: 'id(pp_buf).clear();'

globals:
  - id: pp_buf
    type: std::string
    restore_value: no
    initial_value: '""'

sensor:
  # (A) Simple, guaranteed: SOC from the standard Battery Service (0x180F / 0x2A19).
  - platform: ble_client
    type: characteristic
    ble_client_id: pp_client
    id: pp_soc_battery_service
    name: "SOC (battery service)"
    service_uuid: "180F"
    characteristic_uuid: "2A19"
    notify: true
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    lambda: 'return x[0];'

  # (B) Full telemetry: subscribe to the JSON notify char, reassemble fragments, parse, fan out.
  - platform: ble_client
    type: characteristic
    ble_client_id: pp_client
    id: pp_json_frames
    name: "Telemetry frames"
    internal: true
    service_uuid: ${json_service_uuid}
    characteristic_uuid: ${json_char_uuid}
    notify: true
    lambda: |-
      std::string &buf = id(pp_buf);
      buf.append((const char *) x.data(), x.size());
      if (buf.size() > 16384) buf.clear();
      while (true) {
        int depth = 0; int start = -1; int endp = -1;
        for (size_t i = 0; i < buf.size(); i++) {
          char ch = buf[i];
          if (ch == '{') { if (depth == 0) start = (int) i; depth++; }
          else if (ch == '}') { depth--; if (depth == 0) { endp = (int) i; break; } }
        }
        if (endp < 0 || start < 0) break;
        std::string o = buf.substr(start, endp - start + 1);
        buf.erase(0, endp + 1);
        // Minimal number extractor: find "key": and parse the number after it. All the
        // fields we publish are numbers, so this avoids the ArduinoJson/json dependency.
        // The leading quote in the pattern prevents suffix collisions (e.g. "ac_i" won't
        // match inside "pcu_ac_i"). Returns NAN (→ HA "unknown") if the key is absent.
        auto num = [&](const char *key) -> float {
          std::string pat = std::string("\"") + key + "\":";
          size_t p = o.find(pat);
          if (p == std::string::npos) return NAN;
          p += pat.size();
          while (p < o.size() && o[p] == ' ') p++;
          return strtof(o.c_str() + p, nullptr);
        };
        id(pp_soc).publish_state(num("soc"));
        id(pp_soh).publish_state(num("soh"));
        id(pp_batt_power).publish_state(num("uiBatP"));
        id(pp_storage_w).publish_state(num("storage_W"));
        id(pp_load_ac).publish_state(num("load_ac_W"));
        id(pp_grid_in).publish_state(num("grid_import_W"));
        id(pp_solar_in).publish_state(num("pv_dc_produce_W"));
        id(pp_inv_out).publish_state(num("pcu_output_W"));
        id(pp_batt_v).publish_state(num("bat_v"));
        id(pp_batt_i).publish_state(num("bat_i"));
        id(pp_batt_temp).publish_state(num("bat_avg_temp"));
        id(pp_batt_temp_max).publish_state(num("bat_max_temp"));
        id(pp_ac_v).publish_state(num("ac_out_v"));
        id(pp_ac_i).publish_state(num("ac_out_i"));
        id(pp_ac_f).publish_state(num("ac_out_f"));
        id(pp_backup_s).publish_state(num("backupTime_s"));
        id(pp_ttfull_s).publish_state(num("timeToCharge_s"));
        id(pp_cycles).publish_state(num("battery_cycles"));
        id(pp_cell_rssi).publish_state(num("CRSSI"));   // gateway.CRSSI — unique key
      }
      float c = id(pp_json_frames).get_state();
      return isnan(c) ? 1.0f : c + 1.0f;

  # ---- Telemetry values (populated by the lambda above) ----
  - platform: template
    id: pp_soc
    name: "Battery"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_soh
    name: "State of Health"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_batt_power
    name: "Battery Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_storage_w
    name: "Storage Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_load_ac
    name: "AC Load"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_grid_in
    name: "Grid Input"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_solar_in
    name: "Solar Input"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_inv_out
    name: "Inverter Output"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_batt_v
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
  - platform: template
    id: pp_batt_i
    name: "Battery Current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
  - platform: template
    id: pp_batt_temp
    name: "Battery Temp"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
  - platform: template
    id: pp_batt_temp_max
    name: "Battery Temp Max"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
  - platform: template
    id: pp_ac_v
    name: "AC Output Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
  - platform: template
    id: pp_ac_i
    name: "AC Output Current"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
  - platform: template
    id: pp_ac_f
    name: "AC Output Frequency"
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 1
  - platform: template
    id: pp_backup_s
    name: "Backup Time"
    unit_of_measurement: "s"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_ttfull_s
    name: "Time To Full"
    unit_of_measurement: "s"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
  - platform: template
    id: pp_cycles
    name: "Battery Cycles"
    state_class: total_increasing
    accuracy_decimals: 0
  - platform: template
    id: pp_cell_rssi
    name: "Cellular Signal"
    unit_of_measurement: "dBm"
    device_class: signal_strength
    state_class: measurement
    accuracy_decimals: 0

  # ---- Debug (ohmward-lab convention) ----
  - platform: wifi_signal
    name: "PowerPack WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "PowerPack Uptime"

text_sensor:
  - platform: version
    name: "PowerPack ESPHome Version"

binary_sensor:
  - platform: status
    name: "PowerPack Status"
